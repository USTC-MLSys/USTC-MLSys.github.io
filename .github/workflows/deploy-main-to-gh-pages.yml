name: Build and publish gh-pages from main

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Build site
        run: python build.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}   # 首选 GITHUB_TOKEN
          personal_token: ${{ secrets.DEPLOY_PAT }}  # 如果 GITHUB_TOKEN 被拒，可用 DEPLOY_PAT 回退
          publish_dir: ./dist
          publish_branch: gh-pages